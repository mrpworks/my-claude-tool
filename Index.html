<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --border: #252525;
      --accent: #e8ff47; --text: #f0f0f0; --muted: #666;
      --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    header { width: 100%; max-width: 720px; margin-bottom: 3rem; }
    header h1 { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
    header h1 span { color: var(--accent); }
    header p { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }
    .card { width: 100%; max-width: 720px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 0.95rem; resize: none; min-height: 120px; line-height: 1.6; }
    textarea::placeholder { color: var(--muted); }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .model-select { background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; padding: 0.4rem 0.75rem; border-radius: 6px; outline: none; cursor: pointer; }
    button { background: var(--accent); color: #000; border: none; font-family: var(--font-display); font-weight: 700; font-size: 0.85rem; padding: 0.6rem 1.5rem; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; }
    button:hover { opacity: 0.85; } button:disabled { opacity: 0.4; cursor: not-allowed; }
    .response-card { width: 100%; max-width: 720px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; display: none; }
    .response-card.visible { display: block; }
    .response-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
    .response-text { font-family: var(--font-mono); font-size: 0.9rem; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
    .status { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 1rem; }
    .status.error { color: #ff6b6b; }
    .dot { display: inline-block; animation: blink 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <header>
    <h1>My<span>Tool</span></h1>
    <p>// powered by claude · proxied safely</p>
  </header>
  <div class="card">
    <textarea id="prompt" placeholder="Type your prompt here..."></textarea>
    <div class="toolbar">
      <select class="model-select" id="model">
        <option value="claude-haiku-4-5-20251001">Haiku — fast</option>
        <option value="claude-sonnet-4-6-20250514" selected>Sonnet — balanced</option>
        <option value="claude-opus-4-5-20251101">Opus — powerful</option>
      </select>
      <button id="sendBtn" onclick="sendPrompt()">Run</button>
    </div>
  </div>
  <div class="response-card" id="responseCard">
    <div class="response-label">Response</div>
    <div class="response-text" id="responseText"></div>
  </div>
  <div class="status" id="status"></div>
  <script>
    async function sendPrompt() {
      const prompt = document.getElementById('prompt').value.trim();
      const model = document.getElementById('model').value;
      const btn = document.getElementById('sendBtn');
      const card = document.getElementById('responseCard');
      const responseText = document.getElementById('responseText');
      const status = document.getElementById('status');
      if (!prompt) return;
      btn.disabled = true;
      status.className = 'status';
      status.innerHTML = 'Thinking<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
      card.classList.remove('visible');
      try {
        const res = await fetch('/.netlify/functions/claude', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, max_tokens: 1024, messages: [{ role: 'user', content: prompt }] })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || 'API error');
        const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
        responseText.textContent = text;
        card.classList.add('visible');
        status.textContent = '';
      } catch (err) {
        status.className = 'status error';
        status.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
